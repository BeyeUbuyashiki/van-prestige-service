<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Utilisateurs – Van Prestige Service</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg"/>
  <link rel="stylesheet" href="/admin/css/admin.css"/>
</head>
<body>
  <div id="toast-container"></div>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="/images/logo.svg" alt="VPS"/>
      <div class="logo-text">
        <span class="logo-main">Van Prestige</span>
        <span class="logo-sub">Service</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Navigation</div>
        <a href="/admin/dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Tableau de bord</a>
        <a href="/admin/reservations.html" class="nav-item"><span class="nav-icon">📋</span> Réservations</a>
        <a href="/admin/users.html" class="nav-item active" id="usersNavLink"><span class="nav-icon">👥</span> Utilisateurs</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Accès rapide</div>
        <a href="/" target="_blank" class="nav-item"><span class="nav-icon">🌐</span> Voir le site</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sidebarAvatar">A</div>
        <div class="user-info">
          <div class="user-name" id="sidebarUserName">Admin</div>
          <div class="user-role" id="sidebarUserRole">Administrateur</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Se déconnecter</button>
    </div>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:1rem">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div class="topbar-title"><h1>Gestion des utilisateurs</h1><span>Superadmin uniquement</span></div>
      </div>
      <button class="btn btn-primary" onclick="openModal('addModal')">+ Ajouter un admin</button>
    </div>

    <div class="page-content" id="mainContent">
      <!-- Access check done in JS -->
    </div>
  </div>

  <!-- Add Admin Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Nouvel administrateur</span>
        <button class="modal-close" onclick="closeModal('addModal')">✕</button>
      </div>
      <form onsubmit="addUser(event)">
        <div class="form-group"><label>Nom complet</label><input type="text" id="addName" placeholder="Mamadou Diallo" required/></div>
        <div class="form-group"><label>Email</label><input type="email" id="addEmail" placeholder="admin@exemple.com" required/></div>
        <div class="form-group">
          <label>Rôle</label>
          <select id="addRole">
            <option value="admin">Administrateur</option>
            <option value="superadmin">Super Administrateur</option>
          </select>
        </div>
        <div class="form-group"><label>Mot de passe</label><input type="password" id="addPassword" placeholder="Minimum 8 caractères" required minlength="6"/></div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Créer le compte</button>
          <button type="button" class="btn btn-ghost" onclick="closeModal('addModal')">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal-overlay" id="pwdModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Changer le mot de passe</span>
        <button class="modal-close" onclick="closeModal('pwdModal')">✕</button>
      </div>
      <div id="pwdUserName" style="color:var(--gray);font-size:0.85rem;margin-bottom:1.5rem"></div>
      <form onsubmit="changePassword(event)">
        <input type="hidden" id="pwdUserId"/>
        <div class="form-group"><label>Nouveau mot de passe</label><input type="password" id="newPassword" placeholder="Minimum 6 caractères" required minlength="6"/></div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <button type="button" class="btn btn-ghost" onclick="closeModal('pwdModal')">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
  <script>
    if (!requireAuth()) {}
    populateSidebarUser();
    initSidebar();
    closeOnOutsideClick('addModal');
    closeOnOutsideClick('pwdModal');

    const content = document.getElementById('mainContent');

    if (!requireSuperAdmin()) {
      content.innerHTML = `<div style="text-align:center;padding:4rem 2rem"><div style="font-size:3rem;margin-bottom:1rem">🔒</div><h2 style="color:var(--white);margin-bottom:0.5rem">Accès restreint</h2><p style="color:var(--gray)">Cette section est réservée aux Super Administrateurs.</p><a href="/admin/dashboard.html" class="btn btn-outline" style="margin-top:1.5rem;display:inline-block">← Retour au dashboard</a></div>`;
    } else {
      content.innerHTML = `
        <div class="card">
          <div class="card-header">
            <span class="card-title">Administrateurs</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nom</th>
                  <th>Email</th>
                  <th>Rôle</th>
                  <th>Statut</th>
                  <th>Créé le</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersBody">
                <tr><td colspan="6" class="table-loading"><div class="spinner"></div> Chargement...</td></tr>
              </tbody>
            </table>
          </div>
        </div>`;
      loadUsers();
    }

    async function loadUsers() {
      const res = await api('/api/admin/users');
      if (!res) return;
      const d = await res.json();
      const tbody = document.getElementById('usersBody');
      if (!d.users || !d.users.length) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">👥</div><p>Aucun utilisateur</p></div></td></tr>';
        return;
      }
      const me = getAdmin();
      tbody.innerHTML = d.users.map(u => `
        <tr>
          <td><strong style="color:var(--white)">${u.name || '—'}</strong></td>
          <td style="color:var(--gray)">${u.email}</td>
          <td>${roleBadge(u.role)}</td>
          <td>${activeBadge(u.is_active)}</td>
          <td style="color:var(--gray);font-size:0.8rem">${formatDate(u.created_at)}</td>
          <td>
            <div class="actions-cell">
              ${me.id !== u.id ? `
                <button class="btn btn-ghost btn-sm" onclick="openPwdModal(${u.id}, '${u.name || u.email}')">🔑</button>
                <button class="btn ${u.is_active ? 'btn-danger' : 'btn-success'} btn-sm" onclick="toggleUser(${u.id}, ${u.is_active})">${u.is_active ? '🚫' : '✅'}</button>
                ${u.role !== 'superadmin' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id}, '${u.name || u.email}')">🗑</button>` : ''}
              ` : '<span style="color:var(--gray);font-size:0.75rem">Vous</span>'}
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function addUser(e) {
      e.preventDefault();
      const payload = {
        name: document.getElementById('addName').value.trim(),
        email: document.getElementById('addEmail').value.trim(),
        password: document.getElementById('addPassword').value,
        role: document.getElementById('addRole').value
      };
      const res = await api('/api/admin/users', { method: 'POST', body: JSON.stringify(payload) });
      if (!res) return;
      const d = await res.json();
      if (!res.ok) { showToast(d.error || 'Erreur.', 'error'); return; }
      showToast('Administrateur créé !', 'success');
      closeModal('addModal');
      e.target.reset();
      loadUsers();
    }

    function openPwdModal(id, name) {
      document.getElementById('pwdUserId').value = id;
      document.getElementById('pwdUserName').textContent = `Modifier le mot de passe de : ${name}`;
      document.getElementById('newPassword').value = '';
      openModal('pwdModal');
    }

    async function changePassword(e) {
      e.preventDefault();
      const id = document.getElementById('pwdUserId').value;
      const pwd = document.getElementById('newPassword').value;
      const res = await api(`/api/admin/users/${id}`, { method: 'PATCH', body: JSON.stringify({ password: pwd }) });
      if (!res) return;
      const d = await res.json();
      if (!res.ok) { showToast(d.error || 'Erreur.', 'error'); return; }
      showToast('Mot de passe mis à jour !', 'success');
      closeModal('pwdModal');
    }

    async function toggleUser(id, currentState) {
      const res = await api(`/api/admin/users/${id}`, { method: 'PATCH', body: JSON.stringify({ is_active: !currentState }) });
      if (!res) return;
      if (res.ok) { showToast('Statut mis à jour.', 'success'); loadUsers(); }
      else showToast('Erreur.', 'error');
    }

    async function deleteUser(id, name) {
      if (!confirm(`Supprimer l'admin "${name}" ? Cette action est irréversible.`)) return;
      const res = await api(`/api/admin/users/${id}`, { method: 'DELETE' });
      if (!res) return;
      if (res.ok) { showToast('Administrateur supprimé.', 'success'); loadUsers(); }
      else showToast('Erreur.', 'error');
    }
  </script>
</body>
</html>
